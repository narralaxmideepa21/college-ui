
<div style="display: flex; justify-content: flex-end; margin:10px;">
        <button mat-raised-button (click)="openDialog()" style="width: 120px; color: whitesmoke; background-color: navy;">
           + Add Student
        </button>
</div>

<div class=" bordered-table mat-elevation-z8">
    <table mat-table   matSort  [dataSource]="dataSource">
      
      <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef  mat-sort-header  style="background-color: #e3f2fd;">ID</th>
          <td mat-cell *matCellDef="let s">{{s.id}}</td>
       </ng-container>

       <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header    style="background-color: #e3f2fd;">Name</th>
          <td mat-cell *matCellDef="let s">{{s.name}}</td>
        </ng-container>

        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef mat-sort-header     style="background-color: #e3f2fd;">Email</th>
          <td mat-cell *matCellDef="let s">{{s.email}}</td>
        </ng-container>

        <ng-container matColumnDef="department">
           <th mat-header-cell *matHeaderCellDef mat-sort-header       style="background-color: #e3f2fd;">Department</th>
           <td mat-cell *matCellDef="let s">{{s.department}}</td>
       </ng-container>

        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef style="background-color: #e3f2fd;">Actions</th>
            <td mat-cell *matCellDef="let s">
                <button mat-icon-button style="color: navy;" (click)="openDialog(s)">
                   <mat-icon>edit</mat-icon>
                </button>
            </td>
        </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

   </table>

   <mat-paginator [pageSizeOptions]="[5,10,20]" [pageSize]="5" aria-label="Select page"></mat-paginator>

</div>
