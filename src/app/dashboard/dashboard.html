<mat-toolbar style="background-color: rgb(215, 215, 69);">
    <span style="color: darkblue;">College Management System Dashboard</span>
    <span class="spacer"></span>
    <button mat-raised-button style="background-color: navy; color: white;"     (click)="auth.logout()">Logout</button>
</mat-toolbar>


<div class="search-container">
   <mat-form-field>
      <!-- <mat-label>Search Modules</mat-label> -->
      <input matInput [(ngModel)]="searchText" placeholder="Students, Departments...">
      <mat-icon matPrefix>search</mat-icon>
   </mat-form-field>
</div>


<div class="dashboard">

  <mat-card class="card" *ngFor="let card of filteredCards()" [routerLink]="card.route" >
     <mat-icon>{{card.icon}}</mat-icon>
     <span>{{card.name}}</span>
  </mat-card>
  
</div>
