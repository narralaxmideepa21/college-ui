<button mat-raised-button style="float: right; background-color: navy; color: white; margin-bottom: 10px; margin-top: 10px; border-radius: 0 !important;" (click)="openDialog()">
    Add Faculty
</button>

<table mat-table [dataSource]="dataSource" class="mat-elevation-z8 bordered-table">

       <ng-container matColumnDef="id">
         <th mat-header-cell *matHeaderCellDef style="background-color:  #e3f2fd;">ID</th>
         <td mat-cell *matCellDef="let r">{{r.id}}</td>
       </ng-container>

        <ng-container matColumnDef="facultyName">
            <th mat-header-cell *matHeaderCellDef style="background-color:  #e3f2fd;">Name</th>
            <td mat-cell *matCellDef="let r">{{r.facultyName}}</td>
       </ng-container>

       <ng-container matColumnDef="departmentId">
          <th mat-header-cell *matHeaderCellDef style="background-color: #e3f2fd;">Department</th>
          <td mat-cell *matCellDef="let r">{{r.departmentId}}</td>
       </ng-container>

      <ng-container matColumnDef="email">
           <th mat-header-cell *matHeaderCellDef style="background-color: #e3f2fd;">Email</th>
          <td mat-cell *matCellDef="let r">{{r.email}}</td>
       </ng-container>

       <ng-container matColumnDef="phone">
           <th mat-header-cell *matHeaderCellDef style="background-color: #e3f2fd;">Phone</th>
           <td mat-cell *matCellDef="let r">{{r.phone}}</td>
       </ng-container>

       <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef style="background-color: #e3f2fd;">Status</th>
          <td mat-cell *matCellDef="let r">{{r.status}}</td>
       </ng-container>

    <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef style="background-color: #e3f2fd;">Actions</th>
        <td mat-cell *matCellDef="let r">

           <button mat-icon-button  style="color: navy;"     (click)="openDialog(r)">
              <mat-icon>edit</mat-icon>
            </button>
            <span class="vertical-divider"></span>
           <button mat-icon-button  style="color: navy;"   (click)="delete(r.id)">
            <mat-icon>delete</mat-icon>
           </button>

        </td>
    </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>


</table>
