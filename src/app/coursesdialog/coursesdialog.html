<h2 mat-dialog-title style="color: navy;">Add Course</h2>
<mat-divider style="background-color: yellow;"></mat-divider>

<mat-dialog-content [formGroup]="courseForm">

  <mat-form-field appearance="fill" style="display: flex; justify-items: center;">
    <mat-label>Course Name</mat-label>
    <input matInput formControlName="courseName">
  </mat-form-field>

  <mat-form-field appearance="fill" style=" display: flex;     justify-items: center;">
    <mat-label>Department</mat-label>
    <mat-select formControlName="departmentId">
        <mat-option value="cse">CSE</mat-option>
        <mat-option value="ece">ECE</mat-option>
        <mat-option value="mech">MECH</mat-option>
        <mat-option value="eee">EEE</mat-option>
        <mat-option value="civil">CIVIL</mat-option>


    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="fill"  style=" display: flex;     justify-items: center;">
    <mat-label>Start Date</mat-label>
    <input matInput [matDatepicker]="picker" formControlName="startDate">
    <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
    <mat-datepicker #picker></mat-datepicker>
  </mat-form-field>

  <mat-form-field appearance="fill" style="display: flex; justify-items: center;">
    <mat-label>Status</mat-label>
    <mat-select formControlName="status">
      <mat-option value="Active">Active</mat-option>
      <mat-option value="Inactive">Inactive</mat-option>
    </mat-select>
  </mat-form-field>
  
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-raised-button  (click)="cancel()">Cancel</button>
  <button mat-raised-button  style="background-color: navy; color: whitesmoke;"    (click)="save()">Save</button>
</mat-dialog-actions>
