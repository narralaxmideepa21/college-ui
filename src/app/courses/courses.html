
<button mat-raised-button style="background-color: navy; color: white; margin-bottom: 10px; float: right; margin-top: 10px; margin-bottom: 8px; border-radius: 0 !important;" (click)="openDialog()">
  Add Course
</button>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8 bordered-table">
    
    <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef style="background-color:  #e3f2fd;">ID</th>
        <td mat-cell *matCellDef="let row">{{row.id}}</td>
    </ng-container>
   
    <ng-container matColumnDef="courseName">
        <th mat-header-cell *matHeaderCellDef style="background-color: #e3f2fd;">Course</th>
        <td mat-cell *matCellDef="let row">{{row.courseName}}</td>
    </ng-container>

    <ng-container matColumnDef="departmentId">
        <th mat-header-cell *matHeaderCellDef style="background-color: #e3f2fd;">Department</th>
        <td mat-cell *matCellDef="let row">{{row.departmentId}}</td>
    </ng-container>

    <ng-container matColumnDef="startDate">
        <th mat-header-cell *matHeaderCellDef style="background-color: #e3f2fd;">StartDate</th>
        <td mat-cell *matCellDef="let row">{{row.startDate}}</td>
    </ng-container>

    <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef style="background-color: #e3f2fd;">Status</th>
        <td mat-cell *matCellDef="let row">{{row.status}}</td>
    </ng-container>
  
   <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
   <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

</table>
