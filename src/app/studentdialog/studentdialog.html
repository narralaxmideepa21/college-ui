

    <h2 mat-dialog-title style="color: navy;">
          {{isEdit ? 'Edit Student' : 'Add Student'}}
          <mat-icon>school</mat-icon>
    </h2>

      <mat-divider style="background-color: hwb(60 0% 0%);"></mat-divider>

        <mat-dialog-content [formGroup]="form" >

            <mat-form-field  style="width: 250px;">
                <mat-label>Name</mat-label>
                <input matInput formControlName="name">
            </mat-form-field>

            <mat-form-field style="width: 250px;" >
                <mat-label>Email</mat-label>
                <input matInput formControlName="email">
            </mat-form-field>

            <mat-form-field style="width: 250px;" >
                <mat-label>Department</mat-label>
                <input matInput formControlName="department">
            </mat-form-field>

        </mat-dialog-content>

       <mat-dialog-actions align="end">
          <button mat-raised-button  style="border-radius: 0 !important;"     (click)="close()">cancel</button>
          <button mat-raised-button style="background-color: #e9e935;  border-radius: 0 !important;" (click)="save()">Save</button>
       </mat-dialog-actions>
