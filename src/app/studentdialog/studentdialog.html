
         
        <h2 mat-dialog-title style="color: navy;">
          {{isEdit ? 'Edit Student' : 'Add Student'}}
        </h2>

     <mat-divider style="background-color: hwb(60 0% 0%);"></mat-divider>
            <mat-dialog-content [formGroup]="form" class="dialog-form">

                <mat-form-field  style="width: 300px !important;">
                   <mat-label>Name</mat-label>
                    <input matInput formControlName="name">
                </mat-form-field>

                <mat-form-field  style="width: 300px !important;">
                   <mat-label>Email</mat-label>
                     <input matInput formControlName="email">
                </mat-form-field>

                 <mat-form-field  style="width: 300px !important;">
                    <mat-label>Department</mat-label>
                    <input matInput formControlName="department">
                </mat-form-field>
           </mat-dialog-content>

       <mat-dialog-actions align="end">
          <button mat-raised-button (click)="close()">cancel</button>
          <button mat-raised-button style="background-color: navy; color: antiquewhite;" (click)="save()">Save</button>
      </mat-dialog-actions>
