   
   <div class="container">
    
        <div class="table-header">
              <button mat-raised-button  (click)="openDialog()" style="background-color: navy; color: whitesmoke; margin-top: 10px; border-radius: 0 !important;">
                  Add Department
               </button>
        </div>
   
       <table mat-table [dataSource]="dataSource" class="mat-elevation-z8 bordered-table">
   
           <ng-container matColumnDef="id">
               <th mat-header-cell *matHeaderCellDef style="background-color: #e3f2fd;">ID</th>
               <td mat-cell *matCellDef="let row">{{row.id}}</td>
           </ng-container>

            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef style="background-color: #e3f2fd;;">Name</th>
              <td mat-cell *matCellDef="let row">{{row.name}}</td>
            </ng-container>

            <ng-container matColumnDef="hod">
               <th mat-header-cell *matHeaderCellDef style="background-color: #e3f2fd;">HOD</th>
               <td mat-cell *matCellDef="let row">{{row.hod}}</td>
           </ng-container>

           <ng-container matColumnDef="status">
              <th mat-header-cell *matHeaderCellDef style="background-color: #e3f2fd;">Status</th>
              <td mat-cell *matCellDef="let row">{{row.status}}</td>
           </ng-container>

           <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef style="background-color: #e3f2fd;">Actions</th>
              <td mat-cell *matCellDef="let row">

                   <button mat-icon-button  style="color: navy;"       (click)="openDialog()">
                       <mat-icon>edit</mat-icon>
                   </button>
                   <span class="vertical-divider"></span>
                   <button mat-icon-button  style="color: navy;"       (click)="delete(row.id)">
                      <mat-icon>delete</mat-icon>
                   </button>
               </td>
           </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
</div>
